<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1320" viewBox="0 0 1800 1320" role="img" aria-labelledby="title desc">
  <title id="title">Sabai Stay UI Overview</title>
  <desc id="desc">UI overview board using actual Sabai Stay route screenshots for the home page, list page, listing details page, and dashboard page.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 32px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.8; rx: 26; ry: 26; }
      .chrome { fill: #e2e8f0; }
      .label { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .note { font: 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .caption { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .caption-note { font: 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .callout { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.3; rx: 18; ry: 18; }
    </style>
    <clipPath id="clip-home">
      <rect x="58" y="190" width="800" height="450" rx="18" ry="18" />
    </clipPath>
    <clipPath id="clip-list">
      <rect x="942" y="190" width="800" height="450" rx="18" ry="18" />
    </clipPath>
    <clipPath id="clip-listing">
      <rect x="58" y="748" width="800" height="450" rx="18" ry="18" />
    </clipPath>
    <clipPath id="clip-dashboard">
      <rect x="942" y="748" width="800" height="450" rx="18" ry="18" />
    </clipPath>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1320" />
  <text class="title" x="40" y="56">Sabai Stay UI Overview</text>
  <text class="subtitle" x="40" y="86">This board uses real route captures from the running application instead of illustrative placeholders.</text>

  <g>
    <rect class="frame" x="40" y="130" width="836" height="530" />
    <rect class="chrome" x="40" y="130" width="836" height="36" rx="26" ry="26" />
    <circle cx="66" cy="148" r="5" fill="#ef4444" />
    <circle cx="84" cy="148" r="5" fill="#f59e0b" />
    <circle cx="102" cy="148" r="5" fill="#22c55e" />
    <text class="label" x="130" y="153">Home Page</text>
    <image href="ui-captures/board-home.png" x="58" y="190" width="800" height="611" clip-path="url(#clip-home)" preserveAspectRatio="xMidYMin slice" />
    <text class="caption" x="58" y="684">Map-first discovery landing page</text>
    <text class="caption-note" x="58" y="708">Actual route: <tspan style="font-family: Consolas, 'Courier New', monospace;">/</tspan></text>
  </g>

  <g>
    <rect class="frame" x="924" y="130" width="836" height="530" />
    <rect class="chrome" x="924" y="130" width="836" height="36" rx="26" ry="26" />
    <circle cx="950" cy="148" r="5" fill="#ef4444" />
    <circle cx="968" cy="148" r="5" fill="#f59e0b" />
    <circle cx="986" cy="148" r="5" fill="#22c55e" />
    <text class="label" x="1014" y="153">List View</text>
    <image href="ui-captures/board-list.png" x="942" y="190" width="800" height="611" clip-path="url(#clip-list)" preserveAspectRatio="xMidYMin slice" />
    <text class="caption" x="942" y="684">Campus-aware filters and result cards</text>
    <text class="caption-note" x="942" y="708">Actual route: <tspan style="font-family: Consolas, 'Courier New', monospace;">/list</tspan></text>
  </g>

  <g>
    <rect class="frame" x="40" y="688" width="836" height="530" />
    <rect class="chrome" x="40" y="688" width="836" height="36" rx="26" ry="26" />
    <circle cx="66" cy="706" r="5" fill="#ef4444" />
    <circle cx="84" cy="706" r="5" fill="#f59e0b" />
    <circle cx="102" cy="706" r="5" fill="#22c55e" />
    <text class="label" x="130" y="711">Listing Details</text>
    <image href="ui-captures/board-listing.png" x="58" y="748" width="800" height="611" clip-path="url(#clip-listing)" preserveAspectRatio="xMidYMin slice" />
    <text class="caption" x="58" y="1242">Hero, utilities, reviews, and booking flow</text>
    <text class="caption-note" x="58" y="1266">Actual route: <tspan style="font-family: Consolas, 'Courier New', monospace;">/listing/:id</tspan></text>
  </g>

  <g>
    <rect class="frame" x="924" y="688" width="836" height="530" />
    <rect class="chrome" x="924" y="688" width="836" height="36" rx="26" ry="26" />
    <circle cx="950" cy="706" r="5" fill="#ef4444" />
    <circle cx="968" cy="706" r="5" fill="#f59e0b" />
    <circle cx="986" cy="706" r="5" fill="#22c55e" />
    <text class="label" x="1014" y="711">Dashboard Page</text>
    <image href="ui-captures/board-dashboard.png" x="942" y="748" width="800" height="611" clip-path="url(#clip-dashboard)" preserveAspectRatio="xMidYMin slice" />
    <text class="caption" x="942" y="1242">Current dashboard route capture</text>
    <text class="caption-note" x="942" y="1266">Actual route: <tspan style="font-family: Consolas, 'Courier New', monospace;">/dashboard</tspan></text>
  </g>

  <rect class="callout" x="40" y="20" width="700" height="70" opacity="0" />
</svg>

